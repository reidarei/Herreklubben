# Daglig påminnelsesjobb og bursdagsgratulasjonar.
# Cron-tidene er i UTC — slot-indeksen i route.ts utregnes fra UTC-time
# for å være DST-uavhengig. På sommer er vinduet 07–10 norsk, på vinter
# 06–09 norsk. Slot 1 (06 UTC) sender i tillegg arrangement-påminnelsar.
# Secret-oppsett (CRON_SECRET og APP_URL): se docs/oppsett.md, seksjon 9.

name: Daglig påminnelse og bursdagsgratulasjon

on:
  schedule:
    # Slot 0: 05 UTC = 07 norsk sommer / 06 norsk vinter
    - cron: '0 5 * * *'
    # Slot 1: 06 UTC = 08 norsk sommer / 07 norsk vinter — påminnelsar kjørar her
    - cron: '0 6 * * *'
    # Slot 2: 07 UTC = 09 norsk sommer / 08 norsk vinter
    - cron: '0 7 * * *'
    # Slot 3: 08 UTC = 10 norsk sommer / 09 norsk vinter — siste sjanse for bursdag.
    # NB: på vinterstid faller slot 0 (06 norsk) utenfor det ideelle 07–10-vinduet,
    # men siste slot (09 norsk) garanterer fortsatt sending samme dag.
    - cron: '0 8 * * *'
  workflow_dispatch: # Kan kjøres manuelt fra GitHub

jobs:
  paaminne:
    runs-on: ubuntu-latest
    steps:
      - name: Send påminnelser og bursdagsgratulasjonar
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L \
            -X POST "${{ secrets.APP_URL }}/api/cron/paaminne" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Påminnelse-endepunktet svarte med HTTP $STATUS"
            exit 1
          fi
