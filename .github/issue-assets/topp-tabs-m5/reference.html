<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>M5 · soft pill — referanse</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0f13;
    --bg-elevated: rgba(40, 42, 50, 0.95);
    --border-subtle: rgba(255, 255, 255, 0.08);
    --text-primary: #f5f5f7;
    --text-tertiary: #c0c4cc;
    --text-muted: rgba(255,255,255,0.4);
    --accent: #e8d9b5;
    --accent-soft: rgba(232, 217, 181, 0.16);
    --accent-hot: #f5e8c8;
    --font-display: 'Instrument Serif', Georgia, serif;
    --font-body: 'Inter', -apple-system, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  html, body { margin: 0; padding: 0; }
  body { background: #f0eee9; font-family: var(--font-body); padding: 40px; display: flex; justify-content: center; }
  .frame {
    width: 390px; height: 720px; border-radius: 36px; overflow: hidden;
    background:
      radial-gradient(ellipse 100% 60% at 50% 0%, rgba(120, 145, 210, 0.08) 0%, transparent 55%),
      linear-gradient(180deg, #14161c 0%, #0e0f13 100%);
    color: var(--text-primary); display: flex; flex-direction: column;
    box-shadow: 0 20px 80px rgba(0,0,0,0.18);
  }
  .statusbar {
    height: 44px; padding: 0 22px 0 26px; display: flex; align-items: center;
    justify-content: space-between; font-weight: 600; font-size: 15px; letter-spacing: -0.2px;
  }
  .statusbar .right { display: flex; gap: 6px; opacity: 0.9; align-items: center; }
  .bat { width: 26px; height: 12px; border: 1px solid currentColor; border-radius: 3px; position: relative; }
  .bat::after { content: ''; position: absolute; inset: 2px; background: currentColor; border-radius: 1px; width: 75%; }

  .header-wrap {
    background: rgba(14,15,19,0.85);
    backdrop-filter: blur(40px) saturate(200%) brightness(1.1);
    border-bottom: 0.5px solid var(--border-subtle);
  }
  .header-inner { height: 60px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .tabs { display: flex; align-items: center; gap: 6px; }
  .tab {
    padding: 8px 14px;
    border-radius: 999px;
    font-family: var(--font-body);
    font-size: 17px;
    font-weight: 400;
    color: var(--text-tertiary);
    opacity: 0.6;
    letter-spacing: -0.3px;
    line-height: 1;
  }
  .tab.active {
    color: var(--accent);
    font-weight: 600;
    opacity: 1;
    background: var(--accent-soft);
  }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(160deg, #6a5d40, #3a3326);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent-hot); font-family: var(--font-display); font-style: italic; font-size: 18px;
  }

  .ctx { padding: 22px 18px 0; }
  .ctx .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 2.5px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
  .ctx h1 { font-family: var(--font-display); font-style: italic; font-size: 44px; margin: 0 0 22px; letter-spacing: -1px; line-height: 1; }
  .ctx .lbl { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
  .card { background: var(--bg-elevated); border: 0.5px solid var(--border-subtle); border-radius: 14px; padding: 14px; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; }
  .thumb { width: 56px; height: 56px; border-radius: 10px; background: rgba(255,255,255,0.05); }
  .lines { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .bar { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.08); width: 70%; }
  .bar.short { width: 40%; background: rgba(255,255,255,0.05); }
</style>
</head>
<body>
  <div class="frame">
    <div class="statusbar">
      <span>9:41</span>
      <span class="right">
        <svg width="17" height="11" viewBox="0 0 17 11" fill="none"><rect x="0" y="6" width="3" height="5" rx="0.5" fill="currentColor"></rect><rect x="5" y="3.5" width="3" height="7.5" rx="0.5" fill="currentColor"></rect><rect x="10" y="1" width="3" height="10" rx="0.5" fill="currentColor"></rect><rect x="14" y="0" width="3" height="11" rx="0.5" fill="currentColor" opacity="0.45"></rect></svg>
        <svg width="15" height="11" viewBox="0 0 15 11" fill="none"><path d="M7.5 1.5C4 1.5 1.5 3.5 0.5 4.5L2 6C2.7 5.3 4.7 4 7.5 4S12.3 5.3 13 6L14.5 4.5C13.5 3.5 11 1.5 7.5 1.5Z" fill="currentColor"></path><circle cx="7.5" cy="9" r="1.5" fill="currentColor"></circle></svg>
        <span class="bat"></span>
      </span>
    </div>
    <div class="header-wrap">
      <div class="header-inner">
        <div class="tabs">
          <span class="tab active">Agenda</span>
          <span class="tab">Chat</span>
          <span class="tab">Klubb</span>
        </div>
        <div class="avatar">R</div>
      </div>
    </div>
    <div class="ctx">
      <div class="eyebrow">Tirsdag</div>
      <h1>16. mai</h1>
      <div class="lbl">I dag</div>
      <div class="card"><div class="thumb"></div><div class="lines"><div class="bar"></div><div class="bar short"></div></div></div>
      <div class="card"><div class="thumb"></div><div class="lines"><div class="bar"></div><div class="bar short"></div></div></div>
      <div class="card"><div class="thumb"></div><div class="lines"><div class="bar"></div><div class="bar short"></div></div></div>
    </div>
  </div>
</body>
</html>
